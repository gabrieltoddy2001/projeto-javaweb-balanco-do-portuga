<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title><ui:insert name="title">Balanço do Portuga</ui:insert></title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <h:outputStylesheet name="css/style.css"/>
</h:head>

<h:body styleClass="body-light">
    <script>
        (function () {
            if (localStorage.getItem('darkMode') === '1') {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
    <div class="app-container">

        <!-- Content -->
        <div class="app-content">
            <ui:insert name="content"/>
        </div>
    </div>
</h:body>
</html>
